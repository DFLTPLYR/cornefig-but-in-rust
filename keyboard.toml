[keyboard]
name = "Corne BTW"
product_name = "Corne But in RMK"
vendor_id = 0x6769
product_id = 0x420f
manufacturer = "DFLTPLYR"
chip = "nrf52840"

[layout]
rows = 4
cols = 12
layers = 4

[host]
vial_enabled = true
unlock_keys = [[0, 0], [0, 1]]

[storage]
# clear_storage = true

[ble]
enabled = true
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split]
connection = "ble"

[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split.central.display]
driver = "ssd1306"
size = "128x32"
rotation = 90
renderer = "crate::column_layout::CentralLayout"

[split.central.display.protocol.i2c]
instance = "TWISPI0"
scl = "P0_20"
sda = "P0_17"
address = 0x3C

[split.central.matrix]
matrix_type = "normal"
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P0_31", "P0_29", "P0_02", "P1_15", "P1_13", "P1_11"]

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split.peripheral.display]
driver = "ssd1306"
size = "128x32"
rotation = 90
renderer = "crate::column_layout::PeripheralLayout"

[split.peripheral.display.protocol.i2c]
instance = "TWISPI0"
scl = "P0_20"
sda = "P0_17"
address = 0x3C

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P1_11", "P1_13", "P1_15", "P0_02", "P0_29", "P0_31"]
